<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title>Melodify- A Virtual Piano</title>
        <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23161716'/%3E%3Crect x='8' y='8' width='48' height='48' rx='8' fill='%23f8f8f8'/%3E%3Crect x='12' y='12' width='6' height='40' fill='%23161616'/%3E%3Crect x='22' y='12' width='6' height='40' fill='%23161616'/%3E%3Crect x='32' y='12' width='6' height='40' fill='%23161616'/%3E%3Crect x='42' y='12' width='6' height='40' fill='%23161616'/%3E%3C/svg%3E">
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    </head>
    <body>
        <canvas id="disco-canvas"></canvas>

        <div id="loader">
            <div class="loader-logo">Melo<em>dify</em></div>
            <div class="loader-sub">Virtual Piano Studio</div>
            <div class="loader-bars">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="loader-hint">Preparing your Studio ....</div>
        </div>
       
        <div id="rotate-overlay">
            <div class="rotate-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="5" y="2" width="14" height="20" rx="2" />
                    <path d="M12 18h.01" />
                    <path d="M3 913-3-3-3"/>
                    <path d="M6 6H2"/>
                </svg>
            </div>
            <div class="rotate-title">Rotate your device</div>
            <div class="rotate-sub">Play Melodify in landscape</div>
            <button class="rotate-btn" id="rotateTryBtn">Try Fullscreen</button>
        </div>

        <div id="root">
            <header class="hd">
         <div class="logo">
               <div class="logo-name">Melo<em>dify</em></div>
               <div class="logo-sub">Virtual Piano Studio</div>
         </div>
         <div class="hd-controls">
            <div class="vol-wrap">
                <span class="vol-label">Volume</span>
                <div class="vol-row">
                    <svg class="vol-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                       <path d="M2 6h3l4-3v10l-4-3H2V6z"/><path d="M11 5.5a3.5 3.5 0 010 5M13 3.5a6 6 0 010 9"/>
                    </svg>
                    <input type="range" id="volSlider" min="0" max="100" step="1" value="80">
                    <span class="vol-val" id="volVal">80</span>
                </div>
            </div>
            <div class="toggle-wrap">
                <span class="toggle-label">Show Keys</span>
                <div class="toggle-track on" id="showKeysBtn" role="switch" aria-checked="true"></div>
            </div>
            <div class="toggle-wrap">
                <span class="toggle-label">Disco</span>
                <div class="toggle-track" id="discoBtn" role="switch" aria-checked="false"></div>
            </div>
         </div>
         </header>

        
        <div class="piano-card">
            <div class="piano-brand">Grand Virtual Piano &mdash; Melodify Studio</div>
            <div class="keys-wrap" id="keysWrap">
                <div class="key white" data-key="a" data-freq="261.63"><span>A</span></div>
                <div class="key black" data-key="w" data-freq="277.18"><span>W</span></div>
                <div class="key white" data-key="s" data-freq="293.66"><span>S</span></div>
                <div class="key black" data-key="e" data-freq="311.13"><span>E</span></div>
                <div class="key white" data-key="d" data-freq="329.63"><span>D</span></div>
                <div class="key white" data-key="f" data-freq="349.23"><span>F</span></div>
                <div class="key black" data-key="t" data-freq="369.99"><span>T</span></div>
                <div class="key white" data-key="g" data-freq="392.00"><span>G</span></div>
                <div class="key black" data-key="y" data-freq="415.30"><span>Y</span></div>
                <div class="key white" data-key="h" data-freq="440.00"><span>H</span></div>
                <div class="key black" data-key="u" data-freq="466.16"><span>U</span></div>
                <div class="key white" data-key="j" data-freq="493.88"><span>J</span></div>
                <div class="key white" data-key="k" data-freq="523.25"><span>K</span></div>
                <div class="key black" data-key="o" data-freq="554.37"><span>O</span></div>
                <div class="key white" data-key="l" data-freq="587.33"><span>L</span></div>
                <div class="key black" data-key="p" data-freq="622.25"><span>P</span></div>
                <div class="key white" data-key=";" data-freq="659.25"><span>;</span></div>
            </div>
          </div>  
          <div class="bottom">
            <div class="rec-bar">
                <div class="rec-top">
                    <div class="reel" id="recReel"></div>
                    <div class="rec-status-group">
                        <div class="rec-status-line">
                            <div class="rec-led" id="recDot"></div>
                            <span class="rec-state-text" id="recState">Ready</span>
                        </div>
                        <div style="display: flex; align-items: baseline; gap: 6px">
                            <span class="rec-clock" id="recClock">0:00</span>
                            <span class="rec-note-count" id="noteBadge"></span>
                        </div>
                    </div>
                </div>
                <div class="pb-strip" id="pbStrip">
                    <div class="pb-rail"><div class="pb-fill" id="pbFill"></div></div>
                    <span class="pb-t" id="pbClock">0:00</span>
                </div>
                <div class="rec-actions">
                   <button class="act act-rec" id="btnRec">
                   <div class="act-icon"><svg viewBox="0 0 14 14" fill="currentColor"><circle cx="7" cy="7" r="4.5"/></svg></div>
                    Record
                   </button>
                   <button class="act act-play" id="btnPlayLive" disabled>
                    <div class="act-icon"><svg viewBox="0 0 14 14" fill="currentColor"><polygon points="3,2 12,7 3,12"/></svg></div>
                    Play
                    </button>  
                    <button class="act act-save" id="btnSave" disabled>
                     <div class="act-icon"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10v2h10v-2M7 2v7M4 6l3 3 3-3"/></svg></div>
                     Save
                     </button> 
                </div>
            </div>
            
            <div class="saved-section">
                <div class="save-head">
                    <span class="saved-title">Saved recordings</span>
                    <button class="clr-btn" id="clearAllBtn" style="display:none">Clear All</button>
                </div>
                <div class="recs-list" id="recsList"></div>
            </div>
          </div>

          <footer>
            <div class="hint-group">
                <span class="hint-lbl">White</span>
                <span class="kdb">A</span><span class="kbd">S</span><span class="kbd">D</span>
                <span class="kbd">F</span><span class="kbd">G</span><span class="kbd">H</span>
                <span class="kbd">J</span><span class="kbd">K</span><span class="kbd">L</span>
                <span class="kbd">;</span>
            </div>
            <div class="hint-group">
                <span class="hint-lbl">Black</span>
                <span class="kbd">W</span><span class="kbd">E</span><span class="kbd">T</span>
                <span class="kbd">Y</span><span class="kbd">U</span><span class="kbd">O</span>
                <span class="kbd">P</span>
            </div>
          </footer>
        </div>
        <script src="disco.js"></script>
        <script src="audio.js"></script>
        <script src="piano.js"></script>
        <script src="recorder.js"></script>
        <script src="store.js"></script>
        <script src="index.js"></script>
    </body>
</html>
