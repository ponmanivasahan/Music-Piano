<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title>Melodify- A Virtual Piano</title>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="disco-canvas"></div>
        <div id="root">
            <header class="hd">
         <div class="logo">
               <div class="logo-name">Melo<em>dify</em></div>
               <div class="logo-sub">Virtual Piano Studio</div>
         </div>
         <div class="hd-controls">
            <div class="vol-wrap">
                <span class="vol-label">Volume</span>
                <div class="vol-row">
                    <svg class="vol-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                       <path d="M2 6h3l4-3v10l-4-3H2V6z"/><path d="M11 5.5a3.5 3.5 0 010 5M13 3.5a6 6 0 010 9"/>
                    </svg>
                    <input type="range" id="volSlider" min="0" max="100" step="1" value="80">
                    <span class="vol-val" id="volVal">80</span>
                </div>
            </div>
            <div class="toggle-wrap">
                <span class="toggle-label">Show Keys</span>
                <div class="toggle-track on" id="showKeysBtn" role="switch" aria-checked="true"></div>
            </div>
            <div class="toggle-wrap">
                <span class="toggle-label">Disco</span>
                <div class="toggle-track" id="discoBtn" role="switch" aria-checked="false"></div>
            </div>
         </div>
         </header>

        
        <div class="piano-card">
            <div class="piano-brand">Grand Virtual Piano &mdash; Melodify Studio</div>
            <div class="keys-wrap" id=""keysWrap>
                <div class="key white" data-key="a" data-freq="261.63"><span>A</span></div>
                <div class="key black" data-key="w" data-freq="261.63"><span>W</span></div>
                <div class="key white" data-key="s" data-freq="261.63"><span>S</span></div>
                <div class="key black" data-key="e" data-freq="261.63"><span>E</span></div>
                <div class="key white" data-key="d" data-freq="261.63"><span>D</span></div>
                <div class="key white" data-key="f" data-freq="261.63"><span>F</span></div>
                <div class="key black" data-key="t" data-freq="261.63"><span>T</span></div>
                <div class="key white" data-key="g" data-freq="261.63"><span>G</span></div>
                <div class="key black" data-key="y" data-freq="261.63"><span>Y</span></div>
                <div class="key white" data-key="h" data-freq="261.63"><span>H</span></div>
                <div class="key black" data-key="u" data-freq="261.63"><span>U</span></div>
                <div class="key white" data-key="j" data-freq="261.63"><span>J</span></div>
                <div class="key white" data-key="k" data-freq="261.63"><span>K</span></div>
                <div class="key black" data-key="o" data-freq="261.63"><span>O</span></div>
                <div class="key white" data-key="l" data-freq="261.63"><span>L</span></div>
                <div class="key black" data-key="p" data-freq="261.63"><span>P</span></div>
                <div class="key white" data-key=";" data-freq="261.63"><span>;</span></div>
            </div>
          </div>  
          
        </div>
        <script src="index.js"></script>
    </body>
</html>
